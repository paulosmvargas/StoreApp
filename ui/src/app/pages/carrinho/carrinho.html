<section class="page">
  <div class="page-header">
    <div>
      <h2>Carrinho</h2>
      <p>Revise seus itens antes de finalizar</p>
    </div>
    <a routerLink="/checkout"><button>Ir para Checkout</button></a>
  </div>

  <div class="cart-grid">
    <div class="itens-grid">
      <div class="card item" *ngFor="let item of itens">
        <div class="info">
          <h3>{{ item.produto.nome }}</h3>
          <p class="price">{{ item.produto.preco | currency: 'BRL' }}</p>
        </div>

        <div class="qtd">
          <button class="ghost" (click)="diminuir(item)">-</button>
          <span>{{ item.quantidade }}</span>
          <button (click)="adicionar(item.produto)">+</button>
        </div>
      </div>
    </div>

    <div class="card resumo">
      <h3>Resumo</h3>
      <p>{{ itens.length }} itens</p>
      <h2>{{ total() | currency: 'BRL' }}</h2>
      <a routerLink="/checkout"><button>Finalizar compra</button></a>
    </div>
  </div>
</section>
