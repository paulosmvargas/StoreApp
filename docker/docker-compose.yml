services:
  db:
    image: postgres:16
    container_name: storeapp-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: storeapp
      POSTGRES_PASSWORD: storeapp
      POSTGRES_DB: storeappdb
    ports:
      - "2345:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

  api:
    build:
      context: ../api/StoreApp.Api
      dockerfile: Dockerfile
    container_name: storeapp-api
    restart: unless-stopped
    environment:
      ASPNETCORE_URLS: http://0.0.0.0:5011
      ConnectionStrings__PgLocal: Host=db;Port=5432;Database=storeappdb;Username=storeapp;Password=storeapp
      ASPNETCORE_ENVIRONMENT: Development
    depends_on:
      - db
    ports:
      - "5011:5011"

  ui:
    build:
      context: ../ui
      dockerfile: Dockerfile
    container_name: storeapp-ui
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "4200:80"

volumes:
  postgres_data:
