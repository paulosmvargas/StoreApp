<h2>Produtos</h2>

<a routerLink="/carrinho">
  <button>Ver Carrinho</button>
</a>

<br><br>

<div class="card" *ngFor="let produto of (produtos$ | async) ?? []">

  <img [src]="produto.imagem" class="produto-img">

  <h3>{{ produto.nome }}</h3>

  <p>{{ produto.preco | currency:'BRL' }}</p>

  <button (click)="adicionarCarrinho(produto)">
    Adicionar ao carrinho
  </button>

</div>
