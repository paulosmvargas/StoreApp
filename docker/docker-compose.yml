services:

  postgres:
    image: postgres:16
    container_name: storeappDB
    restart: always
    environment:
      POSTGRES_USER: storeapp
      POSTGRES_PASSWORD: storeapp
      POSTGRES_DB: storeappdb
    ports:
      - "2345:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../db/init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  postgres_data: